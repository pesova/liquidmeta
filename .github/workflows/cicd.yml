name: Deploy AI MarketLink

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Test & Build Backend (CI only)
  build-backend:
    runs-on: ubuntu-latest
    name: Build & Lint Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend linting
        run: |
          cd backend
          npm run lint || true

      - name: Build backend TypeScript
        run: |
          cd backend
          npm run build

  # Job 2: Test & Build Frontend (CI only)
  build-frontend:
    runs-on: ubuntu-latest
    name: Build & Lint Frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # Job 3: Deploy to EC2 (FULL artifact deploy, no install on server)
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    name: Deploy Fully Built App to EC2
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 🔧 Backend install + build (WITH node_modules)
      - name: Install & Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      # 🔧 Frontend install + build
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 📦 Prepare deployment package (INCLUDING node_modules)
      - name: Create deployment package
        run: |
          mkdir deploy

          # Backend (include node_modules + build)
          cp -r backend deploy/backend

          # Frontend (only dist needed)
          mkdir -p deploy/frontend
          cp -r frontend/dist deploy/frontend/

          # PM2 config
          cp ecosystem.config.js deploy/ || true

      # 🚀 Upload everything
      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          TARGET: /home/ubuntu/ai-marketlink
          SOURCE: "deploy/"
          ARGS: "-rlgoDzvc"

      # 🔄 Restart only (NO install, NO build)
      - name: Restart services on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd /home/ubuntu/ai-marketlink

            # Restart PM2 instantly
            pm2 restart marketlink-api --update-env || pm2 start ecosystem.config.js
            pm2 save

            # Reload Nginx
            sudo nginx -s reload || sudo systemctl restart nginx

            echo "✓ Zero-install deployment completed!"