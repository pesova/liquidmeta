deploy:
  runs-on: ubuntu-latest
  name: Deploy to EC2 (build on server)
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy & Build on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT }}
        script: |
          cd /home/ubuntu/ai-marketlink
          
          # Pull latest code
          git fetch origin
          git reset --hard origin/main
          
          # Install root dependencies
          npm install --production
          
          # Backend build
          cd backend
          npm install --production
          npm run build
          cd ..
          
          # Frontend build
          cd frontend
          npm install --production
          npm run build
          cd ..
          
          # Restart PM2 app
          pm2 restart marketlink-api --update-env || pm2 start ecosystem.config.js
          pm2 save
          
          # Reload Nginx
          sudo nginx -s reload || sudo systemctl restart nginx
          
          echo "✓ Deployment & build completed successfully on EC2!"